<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card - 02 Project</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card-container">
      <div class="card">
        <div class="card-image">
          <img src="./images/image-equilibrium.jpg" alt="Equilibrium Image" />
          <div class="card-view">
            <img src="./images/icon-view.svg" alt="" />
          </div>
        </div>

        <div class="card-text">
          <h3>Equilibrium #3429</h3>
          <p>Our Equilibrium collection promotes balance and calm</p>

          <div class="text-section">
            <div class="text-section-left">
              <svg xmlns="http://www.w3.org/2000/svg" width="11" height="18">
                <path
                  d="M11 10.216 5.5 18 0 10.216l5.5 3.263 5.5-3.262ZM5.5 0l5.496 9.169L5.5 12.43 0 9.17 5.5 0Z"
                  fill="#00FFF8"
                />
              </svg>
              &nbsp;

              <span>0.041 ETH</span>
            </div>

            <div class="text-section-right">
              <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17">
                <path
                  d="M8.305 2.007a6.667 6.667 0 1 0 0 13.334 6.667 6.667 0 0 0 0-13.334Zm2.667 7.334H8.305a.667.667 0 0 1-.667-.667V6.007a.667.667 0 0 1 1.334 0v2h2a.667.667 0 0 1 0 1.334Z"
                  fill="#8BACD9"
                />
              </svg>
              &nbsp;

              <span>3 days left</span>
            </div>
          </div>

          <div class="image-section">
            <img src="./images/image-avatar.png" alt="Avatar Image" />

            <p>Creation of <span>Jules Wyvern</span></p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
