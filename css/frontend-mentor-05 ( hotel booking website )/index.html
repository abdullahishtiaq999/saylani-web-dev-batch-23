<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hotel Booking Website - Project 05</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <input type="checkbox" id="hamburger-menu" />
    <div class="container">
      <header>
        <div class="top justify-content-between">
          <div class="logo">
            <img src="./assets/images/logo.svg" alt="Maison Soliel" />
          </div>
          <div class="menu-bar">
            <label for="hamburger-menu" id="menu-icon">
              <img
                src="./assets/images/menu.svg"
                alt="Menu Icon"
                class="nav-icon"
              />
            </label>
            <label for="hamburger-menu" id="close-icon">
              <img
                src="./assets/images/close.svg"
                alt="Menu Icon"
                class="nav-icon"
              />
            </label>
          </div>
        </div>
        <div class="middle">
          <div class="nav-links">
            <span class="justify-content-between"
              ><span class="span"
                ><img src="./assets/images/bed.svg" alt="Bed Icon" />
                <a href="#">Your stay</a>
              </span>
              <div class="message">1</div>
            </span>
            <span
              ><img src="./assets/images/house.svg" alt="House Icon" /><a
                href="#"
                >The house</a
              ></span
            >
            <span
              ><img src="./assets/images/location.svg" alt="Location Icon" /><a
                href="#"
                >Around town</a
              ></span
            >
            <span
              ><img
                src="./assets/images/breakfast.svg"
                alt="Breakfast Icon"
              /><a href="#">Breakfast</a></span
            >
            <span
              ><img src="./assets/images/mail.svg" alt="Mail Icon" /><a href="#"
                >Messages</a
              ></span
            >
            <div class="wheater">
              <span>TODAY IN CASSIS</span>
              <span id="temprature">27<sup>o</sup></span>
              <span>Sunny - light breeze</span>
            </div>
          </div>
          <div class="footer">
            <span>EST. 1987</span>
            <span>Maison Soleil · 12 Rue des Oliviers · Cassis</span>
            <span>© 2026 Maison Soleil</span>
          </div>
        </div>
      </header>
    </div>
  </body>
</html>
